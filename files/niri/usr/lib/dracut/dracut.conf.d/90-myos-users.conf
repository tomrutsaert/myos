# Ensure early boot systemd-tmpfiles and udev can resolve Fedora system users/groups.
# Fedora 44 bootc initramfs otherwise logs Unknown group/user for audio, disk,
# kvm, tss, utmp, etc. before switching to the real root.
add_dracutmodules+=" myos-users "
install_items+=" /usr/lib/passwd /usr/lib/group /usr/lib/sysusers.d/basic.conf /usr/lib/sysusers.d/tpm2-tss.conf "
