# Niri image SDDM defaults.
# Do not force a replacement SDDM theme here: if Fedora's configured theme is
# unavailable, SDDM falls back to its embedded theme instead of switching to maya.
[Theme]
CursorTheme=Adwaita
CursorSize=24

[General]
DisplayServer=wayland

[Wayland]
CompositorCommand=weston --shell=kiosk --use-pixman
