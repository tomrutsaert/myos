# Override Fedora's /usr/lib/tmpfiles.d/selinux-policy.conf to avoid writing
# /sys/fs/selinux/checkreqprot. Fedora 44 logs this as unsupported; keep the
# remaining sysfs relabel rules from the packaged file.
z /sys/devices/system/cpu/online - - -
Z /sys/class/net - - -
z /sys/kernel/uevent_helper - - -
