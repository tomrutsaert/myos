modules:
  - type: dnf
    install:
      allow-erasing: true
      install-weak-deps: false
      packages:
        - sway
        - waybar
        - mako
        - network-manager-applet
        - playerctl
        - pavucontrol
        - blueman
        - kitty
        - fuzzel
        - greetd
        - tuigreet
        - xfce-polkit
        - gnome-keyring
        - dbus-tools
        - xdg-desktop-portal-wlr
        - xdg-desktop-portal-gtk
        - xorg-x11-server-Xwayland
        - swaybg
        - swayidle
        - swaylock
        - grim
        - slurp
        - wl-clipboard
        - wlr-randr
        - kanshi
        - wev
        - brightnessctl
        - Thunar
        - gvfs
        - gvfs-smb
        - gvfs-mtp
        - gvfs-afc
        - gvfs-gphoto2
        - thunar-archive-plugin
        - xarchiver
        - ffmpegthumbnailer
        - tumbler
        - distrobox
        - pamixer
        - android-tools
  - type: files
    files:
      - source: sway
        destination: /
  - type: systemd
    system:
      enabled:
        - greetd.service
