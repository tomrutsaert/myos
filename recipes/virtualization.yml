modules:
  - type: dnf
    install:
      skip-unavailable: true
      packages:
        - virt-install
        - libvirt-daemon-config-network
        - libvirt-daemon-kvm
        - libvirt-daemon-driver-qemu
        - qemu-kvm
        - virt-manager
        - virt-viewer
        - guestfs-tools
        - python3-libguestfs
  - type: systemd
    system:
      enabled:
        - libvirtd.service