modules:
  - type: dnf
    install:
      allow-erasing: true
      packages:
        - niri
        - waybar
        - mako
        - network-manager-applet
        - playerctl
        - grim
        - slurp
        - xdg-desktop-portal-wlr
        - xdg-desktop-portal-gnome
        - xdg-desktop-portal-gtk
        - alacritty
        - kitty
        - fuzzel
        - swaylock
        - swayidle
        - swaybg
        - greetd
        - tuigreet
        - xwayland-satellite
        - brightnessctl
        - xfce-polkit
        - gnome-keyring
  - type: files
    files:
      - source: niri
        destination: /
  - type: systemd
    system:
      enabled:
        - greetd.service
