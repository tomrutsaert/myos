modules:
  - type: dnf
    install:
      packages:
        - niri
        - waybar
        - mako
        - network-manager-applet
        - playerctl
        - grim
        - slurp
        - xdg-desktop-portal-wlr
        - xdg-desktop-portal-gtk
        - xdg-desktop-portal-gnome
        - alacritty
        - fuzzel
        - swaylock
        - swayidle
        - swaybg
        - sddm
        - sddm-themes
        - xwayland-satellite
        - brightnessctl
        - wireplumber
        - polkit
        - xfce-polkit
        - gnome-keyring
  - type: files
    files:
      - source: niri
        destination: /
  - type: systemd
    system:
      enabled:
        - sddm-useradd.service
        - sddm.service
