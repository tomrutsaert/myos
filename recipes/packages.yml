modules:
  - type: dnf
    repos:
      cleanup: true
      files:
        - vscodium.repo
    install:
      skip-unavailable: true
      packages:
        - swappy
        - syncthing
        - codium
        - darkman
        - fprintd-pam
        - gnome-keyring-pam
        - gcc
        - make
        - patch
        - binutils
        - git
        - ddcutil
  - type: systemd
    system:
      enabled:
        - sshd.service
    user:
      enabled:
        - darkman.service
        - syncthing.service
