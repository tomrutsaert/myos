modules:
  - type: dnf
    repos:
      cleanup: true
      files:
        - vscodium.repo
    install:
      skip-unavailable: true
      packages:
        - swappy
        - syncthing
        - codium
        - darkman
        - chromium
        - fedora-chromium-config
        - procps-ng
        - curl
        - file
        - gcc
        - make
        - patch
        - binutils
        - file
        - git
        - which
  - type: systemd
    user:
      enabled:
        - darkman.service
